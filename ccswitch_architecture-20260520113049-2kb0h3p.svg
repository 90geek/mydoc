<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">DeepSeek + CCSwitch + Claude Code 工作流</title>
  <desc id="desc">开发者在 Claude Code 中操作，CCSwitch 负责配置管理和代理转发，最终请求 DeepSeek API。</desc>
  <rect width="1200" height="520" fill="#f7f8fb"/>
  <rect x="60" y="72" width="250" height="160" rx="8" fill="#ffffff" stroke="#cfd6e4" stroke-width="2"/>
  <text x="185" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">开发者</text>
  <text x="185" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#536176">在终端发起任务</text>
  <rect x="60" y="286" width="250" height="120" rx="8" fill="#edf7f1" stroke="#95c6a6" stroke-width="2"/>
  <text x="185" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#1d5f38">项目代码</text>

  <rect x="420" y="88" width="300" height="132" rx="8" fill="#ffffff" stroke="#cfd6e4" stroke-width="2"/>
  <text x="570" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#172033">Claude Code</text>
  <text x="570" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#536176">读取上下文 / 调用工具</text>

  <rect x="420" y="300" width="300" height="132" rx="8" fill="#fff8e8" stroke="#e2b65d" stroke-width="2"/>
  <text x="570" y="356" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#5e4200">CCSwitch</text>
  <text x="570" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#6d5a2b">供应商配置 / 代理转发</text>

  <rect x="850" y="184" width="290" height="152" rx="8" fill="#eef4ff" stroke="#8fb0e8" stroke-width="2"/>
  <text x="995" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#123d7a">DeepSeek API</text>
  <text x="995" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#49617f">低成本模型推理</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#344055"/>
    </marker>
  </defs>
  <line x1="310" y1="152" x2="410" y2="152" stroke="#344055" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="570" y1="220" x2="570" y2="290" stroke="#344055" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="720" y1="366" x2="842" y2="292" stroke="#344055" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="842" y1="226" x2="720" y2="154" stroke="#344055" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="310" y1="346" x2="410" y2="366" stroke="#344055" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="365" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#536176">交互</text>
  <text x="786" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#536176">请求</text>
  <text x="786" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#536176">结果</text>
</svg>
